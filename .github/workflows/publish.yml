name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Install git-cliff
        run: cargo install git-cliff

      # ── Calculate versions & publish ───────────────────

      - name: Calculate versions and publish
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail

          # ── Auto-discover publishable packages from src/ ──
          # Only include projects that have <PackageId> (i.e. NuGet packages)
          PACKAGES=()
          for csproj in src/*/*.csproj; do
            if grep -q '<PackageId>' "$csproj" 2>/dev/null; then
              dir=$(basename "$(dirname "$csproj")")
              PACKAGES+=("${dir}|${csproj}")
            fi
          done

          echo "── Discovered packages ──"
          for entry in "${PACKAGES[@]}"; do
            IFS='|' read -r name _ <<< "$entry"
            echo "  $name"
          done

          # ── Conventional commit parser ────────────────
          # Returns: type|scope|breaking
          parse_commit() {
            local msg="$1"
            local first_line
            first_line=$(echo "$msg" | head -1)

            # Store regex in variable to avoid bash parsing issues with ()
            local pattern='^([a-z]+)(\(([^)]+)\))?(!)?: (.+)$'
            if [[ "$first_line" =~ $pattern ]]; then
              local type="${BASH_REMATCH[1]}"
              local scope="${BASH_REMATCH[3]}"
              local bang="${BASH_REMATCH[4]}"
              local breaking="false"

              [[ "$bang" == "!" ]] && breaking="true"

              # Also check body for BREAKING CHANGE:
              if [[ "$breaking" == "false" ]]; then
                local body
                body=$(echo "$msg" | tail -n +2)
                if echo "$body" | grep -q 'BREAKING CHANGE:'; then
                  breaking="true"
                fi
              fi

              echo "${type}|${scope:-}|${breaking}"
            else
              echo ""
            fi
          }

          # ── Bump version ──────────────────────────────
          bump_version() {
            local version="$1"
            local level="$2"
            local IFS='.'
            read -r major minor patch <<< "$version"

            case "$level" in
              major) echo "$((major + 1)).0.0" ;;
              minor) echo "${major}.$((minor + 1)).0" ;;
              patch) echo "${major}.${minor}.$((patch + 1))" ;;
            esac
          }

          # ═════════════════════════════════════════════════════════════
          # Tag-push safety net. A tag enters TAGS_TO_PUSH ONLY after its
          # NuGet push succeeded, so "package on NuGet" ⟺ "tag pushed".
          # The EXIT trap runs on both success and failure: on failure it
          # still pushes whatever tags are already recorded (exactly the
          # already-published packages). Re-runs are safe — NuGet's
          # --skip-duplicate and the tag-side "already exists" / up-to-date
          # responses are both tolerated.
          # ═════════════════════════════════════════════════════════════
          TAGS_TO_PUSH=()

          push_tags() {
            if [[ ${#TAGS_TO_PUSH[@]} -eq 0 ]]; then
              echo ""
              echo "No tags to push."
              return 0
            fi
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  🏷️  Pushing ${#TAGS_TO_PUSH[@]} tag(s)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            for tag in "${TAGS_TO_PUSH[@]}"; do
              if out=$(git push origin "$tag" 2>&1); then
                echo "  ✅ Pushed ${tag}"
              elif echo "$out" | grep -qE 'already exists|up-to-date'; then
                echo "  ⏭️  ${tag} already on remote"
              else
                echo "  ❌ Failed to push ${tag}: ${out}"
              fi
            done
          }
          trap push_tags EXIT

          # ═══ Phase 1a — Resolve every package's version ═══════════
          # One relative computation per package: resolved = bump(latest_tag,
          # commits since). A package publishes this run iff resolved !=
          # latest_tag. resolved is then reused as the dependency version its
          # siblings must reference — a sibling published this run resolves to
          # its new tag; one that isn't resolves to its already-published tag.
          declare -A RESOLVED         # name -> resolved version
          TO_PUBLISH=()               # name|version|tag|csproj
          for entry in "${PACKAGES[@]}"; do
            IFS='|' read -r name csproj <<< "$entry"

            last_tag=$(git tag -l "${name}@v*" --sort=-v:refname | head -1 || true)
            if [[ -z "$last_tag" ]]; then
              echo "  ⚠️  No previous tag for ${name}, skipping (needs initial tag)"
              continue
            fi
            last_version="${last_tag#*@v}"

            # ── Scan commits since last tag for this package ──
            has_major=false
            has_minor=false
            has_patch=false
            while IFS= read -r commit_hash; do
              [[ -z "$commit_hash" ]] && continue
              msg=$(git log -1 --format="%B" "$commit_hash")
              parsed=$(parse_commit "$msg")
              [[ -z "$parsed" ]] && continue
              IFS='|' read -r type scope breaking <<< "$parsed"

              # Scope → package (exact): "Core" → Huskui.Avalonia,
              # <suffix> → Huskui.Avalonia.<suffix>, else matches nothing.
              if [[ -z "$scope" ]]; then
                continue
              elif [[ "$scope" == "Core" ]]; then
                [[ "$name" != "Huskui.Avalonia" ]] && continue
              else
                [[ "$name" != "Huskui.Avalonia.${scope}" ]] && continue
              fi

              if [[ "$breaking" == "true" ]]; then
                has_major=true
              elif [[ "$type" == "feat" ]]; then
                has_minor=true
              elif [[ "$type" == "fix" || "$type" == "perf" || "$type" == "refactor" ]]; then
                has_patch=true
              fi
            done < <(git log --format="%H" "${last_tag}..HEAD" 2>/dev/null)

            direct_bump=""
            if [[ "$has_major" == "true" ]]; then
              direct_bump="major"
            elif [[ "$has_minor" == "true" ]]; then
              direct_bump="minor"
            elif [[ "$has_patch" == "true" ]]; then
              direct_bump="patch"
            fi

            if [[ -n "$direct_bump" ]]; then
              new_version=$(bump_version "$last_version" "$direct_bump")
              new_tag="${name}@v${new_version}"
              # Tag exists ⟺ already published (fresh checkout only sees
              # remote tags). Pin to the published version; do not republish.
              if git rev-parse "$new_tag" >/dev/null 2>&1; then
                RESOLVED["$name"]="$new_version"
                echo "  ⏭️  ${name}: ${new_tag} already published"
                continue
              fi
              RESOLVED["$name"]="$new_version"
              TO_PUBLISH+=("${name}|${new_version}|${new_tag}|${csproj}")
              echo "  📋 ${name}: ${last_version} → ${new_version} (${direct_bump})"
            else
              RESOLVED["$name"]="$last_version"
              echo "  ⏭️  ${name}: no relevant changes, pinned to ${last_version}"
            fi
          done

          # Global dependency-pin map "id=ver|id=ver|...". '|'-delimited
          # because ';' would make MSBuild treat -p: as multiple properties.
          # Directory.Build.targets only overrides deps the packed project
          # actually references, so passing the full map is safe.
          PINNED=""
          for entry in "${PACKAGES[@]}"; do
            IFS='|' read -r pname _ <<< "$entry"
            [[ -n "${RESOLVED[$pname]+x}" ]] || continue
            PINNED+="${PINNED:+|}${pname}=${RESOLVED[$pname]}"
          done
          echo ""
          echo "  🔗 Resolved pins: ${PINNED:-<none>}"

          # ═══ Phase 1b — Pack everything (all-or-nothing) ═══════════
          # Any failure aborts via set -e before any push happens: nothing
          # reaches NuGet and no tags are recorded. Clean slate.
          BUILT=()  # entries: name|version|tag|nupkg_dir
          for entry in "${TO_PUBLISH[@]}"; do
            IFS='|' read -r name version tag csproj <<< "$entry"
            pkg_src_dir=$(dirname "$csproj")

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  📦 ${name} (build) → ${version}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # Changelog into the package dir; Directory.Build.props picks it
            # up at pack time. (Raw multiline via -p:PackageReleaseNotes makes
            # MSBuild parse "- ..." lines as switches — MSB1006.)
            git-cliff --latest --include-path "${pkg_src_dir}/**" -o "${pkg_src_dir}/RELEASE_NOTES.md" 2>/dev/null || echo "No changes" > "${pkg_src_dir}/RELEASE_NOTES.md"

            pkg_out="./publish/${name}"
            mkdir -p "$pkg_out"
            dotnet pack "$csproj" \
              --configuration Release \
              --output "$pkg_out" \
              -p:Version="${version}" \
              -p:HuskuiPinnedVersions="${PINNED}"

            rm -f "${pkg_src_dir}/RELEASE_NOTES.md"

            BUILT+=("${name}|${version}|${tag}|${pkg_out}")
            echo "  ✅ Built ${name}@v${version}"
          done

          # ═══ Phase 2 — Publish & tag (invariant-critical) ══════════
          # For each built package: push to NuGet, and ONLY on success create
          # the local tag and record it. A push failure aborts (set -e); the
          # EXIT trap then pushes whatever tags are recorded so far —
          # exactly the already-published packages.
          if [[ ${#BUILT[@]} -eq 0 ]]; then
            echo ""
            echo "No packages to publish this round."
          else
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  📤 Publishing ${#BUILT[@]} package(s)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            for entry in "${BUILT[@]}"; do
              IFS='|' read -r name version tag pkg_out <<< "$entry"

              echo ""
              echo "  📦 ${name}@v${version}"

              # Push to NuGet. Failure aborts here; trap pushes tags recorded so far.
              dotnet nuget push "${pkg_out}"/*.nupkg \
                --api-key "$NUGET_API_KEY" \
                --source https://api.nuget.org/v3/index.json \
                --skip-duplicate

              # NuGet push succeeded → create tag and queue it.
              # Fresh checkout guarantees the tag doesn't exist locally.
              git tag "$tag"
              TAGS_TO_PUSH+=("$tag")

              echo "  ✅ Published ${name}@v${version}"
            done
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  🎉 All packages published"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          fi
          # EXIT trap (push_tags) pushes all recorded tags next.
