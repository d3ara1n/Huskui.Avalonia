name: Deploy Gallery (WASM) to Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish browser project
        working-directory: src/Huskui.Gallery.Browser
        run: dotnet publish Huskui.Gallery.Browser.csproj -c Release

      - name: Disable Jekyll
        run: touch src/Huskui.Gallery.Browser/bin/Release/net10.0-browser/publish/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/Huskui.Gallery.Browser/bin/Release/net10.0-browser/publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
